timeout: 1600s
options:
  logging: CLOUD_LOGGING_ONLY
  # Manual `gcloud builds submit` (make deploy) has no SHORT_SHA; let it
  # resolve to "" instead of rejecting the build.
  substitution_option: ALLOW_LOOSE

substitutions:
  # The image lives where Cloud Run's original source-deploy trigger put
  # it (Artifact Registry, us-east4) so trigger deploys and `make deploy`
  # update the same service with the same image lineage.
  _IMAGE: us-east4-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/podcasting_server/podcasting-server
  _CACHE_IMAGE: us-east4-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/podcasting_server/podcasting-server:buildcache
  _SERVICE: podcasting-server
  _REGION: us-east4

steps:
  # (Optional) sanity check: print what we'll use
  - name: gcr.io/cloud-builders/gcloud
    entrypoint: bash
    args:
      - -lc
      - |
        echo "PROJECT_ID=${PROJECT_ID}"
        echo "SHORT_SHA=${SHORT_SHA}"
        echo "_IMAGE=${_IMAGE}"
        echo "_CACHE_IMAGE=${_CACHE_IMAGE}"
        # Stamp the build so GET /version reports which deploy is live
        # (the file is go:embed-ded into the binary). Manual submits have
        # no SHORT_SHA — keep the repo's hand-bumped version.txt then.
        if [ -n "${SHORT_SHA}" ]; then
          echo "${SHORT_SHA}" > cmd/server/version.txt
        fi

  # Create & bootstrap a buildx builder (BuildKit)
  - name: gcr.io/cloud-builders/docker
    args: ["buildx", "create", "--use", "--name", "cb-bx"]
  - name: gcr.io/cloud-builders/docker
    args: ["buildx", "inspect", "--bootstrap"]

  # Build with registry cache and push
  - name: gcr.io/cloud-builders/docker
    env: ["DOCKER_BUILDKIT=1"]
    args:
      - buildx
      - build
      - --tag=${_IMAGE}:${SHORT_SHA}
      - --cache-from=type=registry,ref=${_CACHE_IMAGE}
      - --cache-to=type=registry,ref=${_CACHE_IMAGE},mode=max
      - --push
      - .

  # Swap the image on the existing service and nothing else: env vars,
  # secrets, and the runtime service account are managed on the service
  # itself (Cloud Run console / gcloud), so a deploy can never clobber
  # them. `services update` also leaves the public-access IAM binding
  # alone, unlike `run deploy --allow-unauthenticated`.
  - name: gcr.io/google.com/cloudsdktool/google-cloud-cli
    entrypoint: gcloud
    args:
      - run
      - services
      - update
      - ${_SERVICE}
      - --image=${_IMAGE}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --quiet
